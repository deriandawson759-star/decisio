<!DOCTYPE html>
<html>

<head>

<title>Decisio Strategic Report</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="charts.js"></script>

</head>

<body>

<div class="container">

<h1>Decisio Strategic Report</h1>

<div class="section">

<h2>Company Analysis</h2>

<ul>

<li>Market Strength: <span id="market"></span></li>
<li>Financial Structure: <span id="finance"></span></li>
<li>Strategic Positioning: <span id="positioning"></span></li>
<li>Operational Execution: <span id="execution"></span></li>
<li>Growth Potential: <span id="growth"></span></li>

</ul>

</div>

<div class="section">

<h2>Strategic Score</h2>

<h3 id="score"></h3>

</div>

<div class="section">

<h2>Strategic Chart</h2>

<canvas id="chart"></canvas>

</div>

</div>

<script>

async function loadReport() {

const response = await fetch(
"https://decisio-production.up.railway.app/analyze",
{
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
market:7,
finance:6,
positioning:8,
execution:7,
growth:6
})
})

const data = await response.json()

document.getElementById("market").innerText =
data.company_analysis.market_strength

document.getElementById("finance").innerText =
data.company_analysis.financial_structure

document.getElementById("positioning").innerText =
data.company_analysis.strategic_positioning

document.getElementById("execution").innerText =
data.company_analysis.operational_execution

document.getElementById("growth").innerText =
data.company_analysis.growth_potential

document.getElementById("score").innerText =
data.strategic_score + "/10"

generateChart({
market:data.company_analysis.market_strength,
finance:data.company_analysis.financial_structure,
positioning:data.company_analysis.strategic_positioning,
execution:data.company_analysis.operational_execution,
growth:data.company_analysis.growth_potential
})

}

loadReport()

</script>

</body>
</html>
